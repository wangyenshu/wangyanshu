<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Deep Archive</title>
</head>
<body>
    <script>
        function buildLabyrinth() {
            const REPO_NAME = 'wangyanshu';
            let content = "<h1>Archive Node</h1><ul>";
            for(let i = 0; i < 2000; i++) {
                let hash = Math.random().toString(36).substring(2, 10);
                content += `<li><a href="${REPO_NAME}/trap/${hash}.html">Sector ${hash}</a></li>`;
            }
            content += "</ul>";
            document.body.innerHTML = content;
        }
        
        buildLabyrinth();
    </script>
</body>
</html>
